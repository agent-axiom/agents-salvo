apply plugin: 'com.android.application'

def defaultVersionCode = 1
def maximumVersionCode = 2100000000
def versionCodeText = System.getenv('SALVO_VERSION_CODE') ?: defaultVersionCode.toString()
if (!(versionCodeText ==~ /^[1-9][0-9]*$/)) {
    throw new GradleException('SALVO_VERSION_CODE must be a positive integer.')
}
def parsedVersionCode = versionCodeText.toBigInteger()
if (parsedVersionCode > maximumVersionCode) {
    throw new GradleException("SALVO_VERSION_CODE must not exceed ${maximumVersionCode}.")
}
def appVersionCode = parsedVersionCode.intValue()

def releaseSigningEnvironment = [
    SALVO_RELEASE_KEYSTORE: System.getenv('SALVO_RELEASE_KEYSTORE'),
    SALVO_RELEASE_STORE_PASSWORD: System.getenv('SALVO_RELEASE_STORE_PASSWORD'),
    SALVO_RELEASE_KEY_ALIAS: System.getenv('SALVO_RELEASE_KEY_ALIAS'),
    SALVO_RELEASE_KEY_PASSWORD: System.getenv('SALVO_RELEASE_KEY_PASSWORD'),
]
def missingReleaseSigningEnvironment = releaseSigningEnvironment.findAll { _, value -> !value }.keySet()
def missingReleaseEnvironment = new LinkedHashSet(missingReleaseSigningEnvironment)
if (!System.getenv('SALVO_VERSION_CODE')) {
    missingReleaseEnvironment.add('SALVO_VERSION_CODE')
}
def releaseTaskRequested = gradle.startParameter.taskNames.any { taskName ->
    taskName.tokenize(':').last().toLowerCase().contains('release')
}

if (releaseTaskRequested && !missingReleaseEnvironment.isEmpty()) {
    throw new GradleException(
        "Android release is not configured. Missing environment variables: " +
            missingReleaseEnvironment.join(', ')
    )
}

android {
    namespace = "io.github.agentaxiom.salvo"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "io.github.agentaxiom.salvo"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (missingReleaseSigningEnvironment.isEmpty()) {
                storeFile file(releaseSigningEnvironment.SALVO_RELEASE_KEYSTORE)
                storePassword releaseSigningEnvironment.SALVO_RELEASE_STORE_PASSWORD
                keyAlias releaseSigningEnvironment.SALVO_RELEASE_KEY_ALIAS
                keyPassword releaseSigningEnvironment.SALVO_RELEASE_KEY_PASSWORD
            }
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test:runner:$androidxTestRunnerVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
