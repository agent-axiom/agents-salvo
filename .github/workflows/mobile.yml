name: Validate Mobile Builds

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Build
        run: npm run build

  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install
        run: npm ci

      - name: Sync native projects
        run: npm run mobile:sync

      - name: Test, lint, and assemble Android
        run: android/gradlew -p android test lint assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Sync native projects
        run: npm run mobile:sync

      - name: Build iOS Simulator
        shell: bash
        run: |
          set -o pipefail
          xcodebuild -project ios/App/App.xcodeproj -scheme App -sdk iphonesimulator -configuration Debug CODE_SIGNING_ALLOWED=NO build 2>&1 | tee xcodebuild.log

      - name: Upload failed iOS build log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: error
