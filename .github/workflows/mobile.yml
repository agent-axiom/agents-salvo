name: Validate Mobile Builds

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Build
        env:
          SALVO_BUILD_ID: ${{ github.sha }}
        run: npm run build

      - name: Verify Telegram Mini App artifacts
        env:
          SALVO_BUILD_ID: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/telegram/index.html
          test "$(grep -Fc 'telegram-web-app.js' dist/telegram/index.html)" -eq 1
          ! grep -Fq 'telegram-web-app.js' dist/index.html
          web_app="$(grep -oE 'app\.[a-f0-9]{10}\.js' dist/index.html)"
          telegram_app="$(grep -oE 'app\.[a-f0-9]{10}\.js' dist/telegram/index.html)"
          test "$web_app" = "$telegram_app"
          test -f "dist/$web_app"
          web_styles="$(grep -oE 'styles\.[a-f0-9]{10}\.css' dist/index.html)"
          telegram_styles="$(grep -oE 'styles\.[a-f0-9]{10}\.css' dist/telegram/index.html)"
          test "$web_styles" = "$telegram_styles"
          test -f "dist/$web_styles"
          grep -Fq "buildId: \"$SALVO_BUILD_ID\"" dist/index.html
          grep -Fq "buildId: \"$SALVO_BUILD_ID\"" dist/telegram/index.html

  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install
        run: npm ci

      - name: Sync native projects
        env:
          SALVO_BUILD_ID: ${{ github.sha }}
        run: npm run mobile:sync

      - name: Test, lint, and assemble Android
        run: android/gradlew -p android test lint assembleDebug

      - name: Run Android instrumentation smoke test
        uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 35
          target: aosp_atd
          arch: x86_64
          emulator-boot-timeout: 300
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: android/gradlew -p android :app:connectedDebugAndroidTest

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Sync native projects
        env:
          SALVO_BUILD_ID: ${{ github.sha }}
        run: npm run mobile:sync

      - name: Build iOS Simulator
        id: ios_build
        shell: bash
        run: |
          set -o pipefail
          xcodebuild -project ios/App/App.xcodeproj -scheme App -sdk iphonesimulator -configuration Debug CODE_SIGNING_ALLOWED=NO build 2>&1 | tee xcodebuild.log

      - name: Upload failed iOS build log
        if: ${{ always() && steps.ios_build.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: ios-xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: error
